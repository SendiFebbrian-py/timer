<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pomodoro Focus</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Inter, Arial, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0f172a, #020617);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }

      .container {
        width: 90%;
        max-width: 420px;
      }

      /* CARD */

      .card {
        position: relative;
        background: rgba(30, 41, 59, 0.9);
        padding: 35px;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }

      /* BACK BUTTON */

      .back-btn {
        position: absolute;
        top: 18px;
        left: 18px;

        width: 40px;
        height: 40px;

        border-radius: 50%;
        border: none;

        background: #334155;
        color: white;

        font-size: 18px;
        cursor: pointer;

        display: flex;
        align-items: center;
        justify-content: center;

        transition: 0.2s;
      }

      .back-btn:hover {
        background: #475569;
        transform: scale(1.1);
      }

      /* TITLE */

      h1 {
        margin-bottom: 20px;
        font-size: 26px;
      }

      /* INPUT */

      .input-group {
        margin-bottom: 18px;
      }

      .input-group label {
        display: block;
        margin-bottom: 6px;
        opacity: 0.8;
        font-size: 14px;
      }

      .input-group input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        background: #0f172a;
        color: white;
        font-size: 16px;
        text-align: center;
      }

      /* BUTTON */

      button {
        background: #2563eb;
        border: none;
        padding: 12px;
        border-radius: 10px;
        font-size: 15px;
        color: white;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background: #1d4ed8;
        transform: translateY(-1px);
      }

      /* TIMER */

      #timerPage {
        display: none;
      }

      #timer {
        font-size: 72px;
        margin: 20px 0;
        font-weight: 700;
        letter-spacing: 2px;
        transition: 0.3s;
      }

      /* STATUS */

      #status {
        opacity: 0.8;
      }

      /* ANIMATION */

      .pulse {
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      /* PROGRESS */

      .progress {
        width: 100%;
        height: 10px;
        background: #334155;
        border-radius: 20px;
        overflow: hidden;
        margin: 20px 0;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #22c55e, #4ade80);
        transition: width 0.4s;
      }

      /* BUTTON GRID */

      .buttons {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 10px;
      }

      .reset {
        grid-column: span 3;
        background: #334155;
      }

      .reset:hover {
        background: #475569;
      }

      /* MOBILE */

      @media (max-width: 480px) {
        #timer {
          font-size: 55px;
        }

        .card {
          padding: 25px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- SETUP -->

      <div id="setup" class="card">
        <h1>Pomodoro Setup</h1>

        <div class="input-group">
          <label>Belajar (menit)</label>
          <input id="studyInput" type="number" value="25" />
        </div>

        <div class="input-group">
          <label>Istirahat (menit)</label>
          <input id="breakInput" type="number" value="5" />
        </div>

        <div class="input-group">
          <label>Jumlah sesi</label>
          <input id="cycleInput" type="number" value="6" />
        </div>

        <button onclick="startApp()">Mulai Fokus</button>
      </div>

      <!-- TIMER -->

      <div id="timerPage" class="card">
        <button class="back-btn" onclick="backToMenu()">←</button>

        <h1>Focus Mode</h1>

        <div id="status">Belajar</div>

        <div id="timer">25:00</div>

        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="buttons">
          <button onclick="startTimer()">Start</button>
          <button onclick="pauseTimer()">Pause</button>
          <button onclick="resumeTimer()">Resume</button>
          <button class="reset" onclick="resetTimer()">Reset</button>
        </div>
      </div>
    </div>

    <audio id="alarm">
      <source
        src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
      />
    </audio>

    <script>
      /* SETTINGS */

      let studyTime;
      let breakTime;
      let cycles;

      /* TIMER */

      let currentCycle = 1;
      let isStudy = true;
      let timeLeft;
      let totalTime;

      let timer = null;
      let isPaused = false;

      const alarm = document.getElementById("alarm");

      /* VOICE */

      function speak(text) {
        const speech = new SpeechSynthesisUtterance(text);

        speech.lang = "id-ID";
        speech.rate = 1;
        speech.pitch = 1;

        speechSynthesis.speak(speech);
      }

      /* LOAD SETTINGS */

      window.onload = () => {
        if (localStorage.getItem("pomodoroSettings")) {
          let s = JSON.parse(localStorage.getItem("pomodoroSettings"));

          document.getElementById("studyInput").value = s.study;
          document.getElementById("breakInput").value = s.break;
          document.getElementById("cycleInput").value = s.cycles;
        }
      };

      /* START APP */

      function startApp() {
        studyTime = document.getElementById("studyInput").value * 60;
        breakTime = document.getElementById("breakInput").value * 60;
        cycles = document.getElementById("cycleInput").value;

        localStorage.setItem(
          "pomodoroSettings",
          JSON.stringify({
            study: studyTime / 60,
            break: breakTime / 60,
            cycles: cycles,
          }),
        );

        timeLeft = studyTime;
        totalTime = studyTime;

        document.getElementById("setup").style.display = "none";
        document.getElementById("timerPage").style.display = "block";

        updateDisplay();
      }

      /* DISPLAY */

      function updateDisplay() {
        let m = Math.floor(timeLeft / 60)
          .toString()
          .padStart(2, "0");
        let s = (timeLeft % 60).toString().padStart(2, "0");

        document.getElementById("timer").innerText = m + ":" + s;

        if (isStudy) {
          document.getElementById("status").innerText =
            "Belajar sesi " + currentCycle + " / " + cycles;
        } else {
          document.getElementById("status").innerText = "Istirahat";
        }

        let percent = ((totalTime - timeLeft) / totalTime) * 100;
        document.getElementById("progressBar").style.width = percent + "%";
      }

      /* TIMER */

      function startTimer() {
        if (timer) return;

        document.getElementById("timer").classList.add("pulse");

        timer = setInterval(() => {
          if (isPaused) return;

          timeLeft--;

          updateDisplay();

          if (timeLeft <= 0) {
            alarm.play();

            if (isStudy) {
              speak("Waktunya istirahat");

              timeLeft = breakTime;
              totalTime = breakTime;
              isStudy = false;
            } else {
              if (currentCycle == cycles) {
                speak("Semua sesi selesai. Kerja bagus");

                resetTimer();
                return;
              }

              speak("Waktu istirahat habis, kembali belajar");

              currentCycle++;

              timeLeft = studyTime;
              totalTime = studyTime;
              isStudy = true;
            }
          }
        }, 1000);
      }

      /* PAUSE */

      function pauseTimer() {
        isPaused = true;
        document.getElementById("status").innerText = "Timer dijeda";
      }

      /* RESUME */

      function resumeTimer() {
        isPaused = false;
        updateDisplay();
      }

      /* RESET */

      function resetTimer() {
        clearInterval(timer);

        timer = null;

        currentCycle = 1;
        isStudy = true;
        timeLeft = studyTime;
        totalTime = studyTime;

        isPaused = false;

        document.getElementById("timer").classList.remove("pulse");

        updateDisplay();
      }

      /* BACK TO MENU */

      function backToMenu() {
        clearInterval(timer);

        timer = null;
        isPaused = false;

        document.getElementById("timer").classList.remove("pulse");

        document.getElementById("timerPage").style.display = "none";
        document.getElementById("setup").style.display = "block";
      }
    </script>
  </body>
</html>
